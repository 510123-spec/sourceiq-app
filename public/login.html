<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erez Impex Pte Ltd — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(99,102,241,.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139,92,246,.14) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
      position: relative;
      z-index: 1;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: #fff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 1px #e5e7eb;
      padding: 4px;
    }

    .logo-icon svg { width: 22px; height: 22px; color: #fff; }

    .logo-text { display: flex; flex-direction: column; }
    .logo-name { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .logo-sub  { font-size: 10px; font-weight: 600; color: rgba(255,255,255,.45); letter-spacing: 1.2px; text-transform: uppercase; }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -.4px;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,.5);
      margin-bottom: 36px;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,.6);
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }

    input::placeholder { color: rgba(255,255,255,.25); }

    input:focus {
      border-color: rgba(99,102,241,.6);
      background: rgba(99,102,241,.08);
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }

    .error {
      display: none;
      background: rgba(239,68,68,.12);
      border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5;
      font-size: 13px;
      font-weight: 500;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .error.show { display: block; }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: 0 8px 28px rgba(99,102,241,.45);
      transition: transform .18s cubic-bezier(.34,1.4,.64,1), box-shadow .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(99,102,241,.6);
    }

    button:active { transform: translateY(0); }

    button:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    button.loading .spinner { display: block; }
    button.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255,255,255,.25);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <img src="/logo-small.png" alt="Erez Impex Pte Ltd" style="width:100%;height:100%;object-fit:contain;" />
      </div>
      <div class="logo-text">
        <span class="logo-name">Erez Impex Pte Ltd</span>
        <span class="logo-sub">Global Supplier Intelligence</span>
      </div>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to access your supplier search platform.</p>

    <div class="error" id="errorBox">Incorrect username or password. Please try again.</div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter your username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>
      <button type="submit" id="submitBtn">
        <div class="spinner"></div>
        <span class="btn-text">Sign In</span>
      </button>
    </form>

    <div class="footer">Erez Impex Pte Ltd &copy; 2024 &mdash; Secure Access</div>
  </div>

  <script>
    // Show error if redirected with ?error=1
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('errorBox').classList.add('show');
    }

    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errorBox = document.getElementById('errorBox');
      errorBox.classList.remove('show');
      btn.classList.add('loading');
      btn.disabled = true;

      const body = new URLSearchParams({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      });

      try {
        const res = await fetch('/login', { method: 'POST', body, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
        if (res.redirected || res.ok) {
          window.location.href = res.url || '/';
        } else {
          errorBox.classList.add('show');
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      } catch {
        errorBox.classList.add('show');
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
