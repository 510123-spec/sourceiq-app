<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/logo-small.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --blue:#2563eb; --ink:#111827; --muted:#6b7280; --line:#e5e7eb; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'DM Sans',sans-serif; color:var(--ink); background:#f9fafb; }
  .hero{ background:linear-gradient(135deg,#1e3a5f,#2563eb); color:#fff; padding:44px 24px; text-align:center; }
  .hero h1{ font-family:'Space Grotesk',sans-serif; font-size:32px; margin:0 0 6px; }
  .hero p{ margin:0; opacity:.9; font-size:15px; }
  .hero .contact{ margin-top:14px; font-size:13.5px; opacity:.95; }
  .wrap{ max-width:900px; margin:0 auto; padding:28px 20px 60px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
  .card h3{ margin:0 0 6px; font-size:16px; color:var(--ink); }
  .card .desc{ font-size:13.5px; color:#374151; line-height:1.55; }
  .card .specs{ font-size:12.5px; color:var(--muted); margin-top:8px; }
  .card .meta{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .tag{ background:#eff6ff; color:var(--blue); border-radius:7px; padding:2px 9px; font-size:11.5px; font-weight:600; }
  .quote-btn{ margin-top:12px; width:100%; background:var(--blue); color:#fff; border:none; border-radius:9px; padding:10px; font-weight:700; font-size:13.5px; cursor:pointer; font-family:inherit; }
  .quote-btn:hover{ background:#1d4ed8; }
  .empty{ text-align:center; color:var(--muted); padding:40px; }
  .form-card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:22px; margin-top:26px; }
  .form-card h2{ font-family:'Space Grotesk',sans-serif; margin:0 0 4px; font-size:20px; }
  .form-card p{ margin:0 0 14px; color:var(--muted); font-size:13.5px; }
  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  label{ display:flex; flex-direction:column; gap:4px; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
  input, textarea{ border:1px solid var(--line); border-radius:9px; padding:10px 12px; font-size:14px; font-family:inherit; font-weight:400; text-transform:none; letter-spacing:0; }
  input:focus, textarea:focus{ outline:none; border-color:var(--blue); }
  .full{ grid-column:1 / -1; }
  .send{ background:var(--blue); color:#fff; border:none; border-radius:9px; padding:12px; font-weight:700; font-size:14.5px; cursor:pointer; font-family:inherit; margin-top:6px; }
  .send:hover{ background:#1d4ed8; }
  .ok{ background:#f0fdf4; border:1px solid #bbf7d0; color:#047857; border-radius:10px; padding:14px; text-align:center; font-weight:600; }
  footer{ text-align:center; color:var(--muted); font-size:12px; padding:24px; }
  @media(max-width:520px){ .form-grid{ grid-template-columns:1fr; } }
</style>
</head>
<body>
  <div class="hero">
    <h1 id="coName">Loading…</h1>
    <p id="coTagline"></p>
    <div class="contact" id="coContact"></div>
  </div>
  <div class="wrap">
    <div class="grid" id="products"></div>
    <div class="form-card" id="quoteForm">
      <h2>Request a Quote</h2>
      <p>Tell us what you need — we'll get back to you with pricing and terms.</p>
      <div id="quoteResult"></div>
      <div class="form-grid" id="quoteFields">
        <label class="full">Product of interest<input id="qProduct" type="text" placeholder="e.g. Copper cathode"></label>
        <label>Your name *<input id="qName" type="text"></label>
        <label>Company<input id="qCompany" type="text"></label>
        <label>Email or phone *<input id="qContact" type="text" placeholder="you@company.com"></label>
        <label>Country<input id="qCountry" type="text"></label>
        <label class="full">Message<textarea id="qMessage" rows="3" placeholder="Quantity, specs, target price, delivery…"></textarea></label>
        <button class="send full" onclick="sendQuote()">Send Request</button>
      </div>
    </div>
  </div>
  <footer>Erez Impex Pte Ltd</footer>
<script>
  const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  let CAT = null;
  fetch('/api/catalog').then(r=>r.json()).then(c=>{
    CAT = c;
    document.getElementById('coName').textContent = c.company || 'Product Catalog';
    document.getElementById('coTagline').textContent = c.tagline || '';
    const bits = [];
    if(c.email) bits.push('✉️ ' + esc(c.email));
    if(c.phone) bits.push('📞 ' + esc(c.phone));
    if(c.whatsapp) bits.push('💬 ' + esc(c.whatsapp));
    document.getElementById('coContact').innerHTML = bits.join(' &nbsp;·&nbsp; ');
    const g = document.getElementById('products');
    if(!c.products || !c.products.length){ g.innerHTML = '<div class="empty">Catalog coming soon.</div>'; return; }
    g.innerHTML = c.products.map(p=>`
      <div class="card">
        <h3>${esc(p.name)}</h3>
        <div class="desc">${esc(p.description)}</div>
        ${p.specs ? `<div class="specs">📋 ${esc(p.specs)}</div>` : ''}
        <div class="meta">${p.origin?`<span class="tag">🌍 ${esc(p.origin)}</span>`:''}${p.terms?`<span class="tag">📦 ${esc(p.terms)}</span>`:''}</div>
        <button class="quote-btn" onclick="document.getElementById('qProduct').value='${esc(p.name).replace(/'/g,'')}';document.getElementById('quoteForm').scrollIntoView({behavior:'smooth'});document.getElementById('qName').focus()">Request Quote</button>
      </div>`).join('');
  });
  async function sendQuote(){
    const name = document.getElementById('qName').value.trim();
    const contact = document.getElementById('qContact').value.trim();
    if(!name || !contact){ alert('Please enter your name and an email or phone.'); return; }
    const body = {
      name, contact, company: document.getElementById('qCompany').value.trim(),
      country: document.getElementById('qCountry').value.trim(),
      product: document.getElementById('qProduct').value.trim(),
      message: document.getElementById('qMessage').value.trim()
    };
    await fetch('/api/catalog/quote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    document.getElementById('quoteFields').style.display='none';
    document.getElementById('quoteResult').innerHTML='<div class="ok">✓ Thank you! Your request has been sent — we\'ll be in touch shortly.</div>';
  }
</script>
</body>
</html>
